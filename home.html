<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookMyDoctor - الرئيسية</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="page-header app-header" style="justify-content:center;">
      <div class="brand" style="flex-direction:column; align-items:center; text-align:center;">
        <img src="logo.jpg" alt="BookMyDoctor Logo" class="brand-logo" />
        <div class="brand-text" style="text-align:center;">
          <h1>BookMyDoctor</h1>
          <p class="brand-tagline">منصة حجز العيادات والأطباء</p>
        </div>
      </div>
    </header>

    <section class="home-grid">
      <a class="home-card" href="index.html">
        <div class="home-icon">📋</div>
        <h2>الحجز</h2>
        <p>إدارة حجوزات المرضى وإضافة مواعيد جديدة</p>
      </a>

      <a class="home-card" href="reports.html">
        <div class="home-icon">📊</div>
        <h2>التقارير</h2>
        <p>عرض الإحصائيات والتقارير والتحليلات</p>
      </a>

      <a class="home-card" href="admin.html">
        <div class="home-icon">⚙️</div>
        <h2>المدير</h2>
        <p>إعدادات العيادة والأطباء وساعات العمل</p>
